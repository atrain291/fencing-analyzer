services:

  frontend:
    image: localhost/fencing-analyzer-frontend:latest
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - fencing
    security_opt:
      - label=disable
      - seccomp=unconfined

  api:
    image: localhost/fencing-analyzer-api:latest
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - fencing
    security_opt:
      - label=disable
      - seccomp=unconfined
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --timeout-keep-alive 120

  worker:
    image: localhost/fencing-analyzer-worker:latest
    build: ./worker
    volumes:
      - ./worker:/app
      - uploads:/app/uploads
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - ollama
    networks:
      - fencing
    # Podman GPU passthrough via CDI (nvidia-container-toolkit must be configured)
    # Run: sudo nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml  (once)
    devices:
      - nvidia.com/gpu=all
    security_opt:
      - label=disable
    command: celery -A app.celery_app worker --loglevel=info --queues=video_pipeline

  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fencing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fencing}
      POSTGRES_DB: ${POSTGRES_DB:-fencing_analyzer}
    volumes:
      - /run/media/adeitz/4e1293b5-6a6b-41e6-bcf5-c7326066fa09/fencing-data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - fencing
    security_opt:
      - label=disable

  redis:
    image: docker.io/library/redis:7-alpine
    volumes:
      - /run/media/adeitz/4e1293b5-6a6b-41e6-bcf5-c7326066fa09/fencing-data/redis:/data
    ports:
      - "6379:6379"
    networks:
      - fencing
    security_opt:
      - label=disable

  ollama:
    image: docker.io/ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - fencing
    devices:
      - nvidia.com/gpu=all
    security_opt:
      - label=disable

volumes:
  ollama_data:
  uploads:

networks:
  fencing:
    driver: bridge
