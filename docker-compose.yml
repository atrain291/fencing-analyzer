services:

  frontend:
    image: localhost/fencing-analyzer-frontend:latest
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - default
    security_opt:
      - label=disable
      - seccomp=unconfined

  api:
    image: localhost/fencing-analyzer-api:latest
    build: ./backend
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - default
    security_opt:
      - label=disable
      - seccomp=unconfined
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --timeout-keep-alive 120

  worker:
    image: localhost/fencing-analyzer-worker:latest
    build: ./worker
    volumes:
      - ./worker:/app
      - uploads:/app/uploads
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - ollama
    networks:
      - default
    # Podman GPU passthrough via CDI (nvidia-container-toolkit must be configured)
    # Run: sudo nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml  (once)
    devices:
      - nvidia.com/gpu=all
    security_opt:
      - label=disable
    command: celery -A app.celery_app worker --loglevel=info --queues=video_pipeline

  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fencing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fencing}
      POSTGRES_DB: ${POSTGRES_DB:-fencing_analyzer}
    volumes:
      - ${POSTGRES_DATA:-./data/postgres}:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - default
    security_opt:
      - label=disable

  redis:
    image: docker.io/library/redis:7-alpine
    volumes:
      - ${REDIS_DATA:-./data/redis}:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - default
    security_opt:
      - label=disable

  wham:
    image: localhost/fencing-analyzer-wham:latest
    build: ./wham
    volumes:
      - ./wham:/app
      - uploads:/app/uploads
      - ./wham/dataset:/opt/wham/dataset
      - ./wham/checkpoints:/opt/wham/checkpoints
    env_file:
      - .env
    environment:
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:256
    depends_on:
      - postgres
      - redis
    networks:
      - default
    devices:
      - nvidia.com/gpu=all
    security_opt:
      - label=disable
    command: celery -A app.celery_app worker --loglevel=info --queues=wham_pipeline --concurrency=1

  ollama:
    image: docker.io/ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    networks:
      - default
    devices:
      - nvidia.com/gpu=all
    security_opt:
      - label=disable

volumes:
  ollama_data:
  uploads:
