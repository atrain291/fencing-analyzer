# Custom BoT-SORT config for fencing analysis.
# Key change: increased track_buffer so the tracker retains lost IDs
# through brief occlusions (e.g., someone walking in front of a fencer).
tracker_type: botsort
track_high_thresh: 0.5
track_low_thresh: 0.1
new_track_thresh: 0.6
track_buffer: 90          # 3s at 30fps (default 30). Survives walk-through occlusions.
match_thresh: 0.8
fuse_score: True
gmc_method: sparseOptFlow
proximity_thresh: 0.5
appearance_thresh: 0.25
with_reid: False
